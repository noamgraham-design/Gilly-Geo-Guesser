<html lang="en">
<head>
<meta charset="utf-8">
<meta name="ad.size" content="width=300,height=250">
<title>Find Jerusalem - Gilly's Israel Quiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:300px;height:250px;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#0b1a2e;position:relative}

/* ── SCREENS ── */
.screen{position:absolute;top:0;left:0;width:300px;height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .45s ease;z-index:1000}
.screen.active{opacity:1;pointer-events:auto}

/* ── INTRO ── */
#intro{background:linear-gradient(160deg,#0d1f38 0%,#132e4a 50%,#1a3f5c 100%);z-index:1001}
.logo-wrap{position:relative;width:90px;height:90px;margin-bottom:8px}
.logo-wrap img{width:90px;height:90px;object-fit:contain;animation:logoFloat 2.6s ease-in-out infinite}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.spark{position:absolute;line-height:1;pointer-events:none;user-select:none;animation:sparkle 2.6s ease-in-out infinite}
.spark-1{top:-4px;right:-2px;color:#7c3aed;font-size:13px;animation-delay:0s}
.spark-2{bottom:4px;left:-6px;color:#60a5fa;font-size:9px;animation-delay:.9s}
.spark-3{top:50%;right:-10px;color:#f59e0b;font-size:10px;animation-delay:1.7s}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0)}40%,60%{opacity:1;transform:scale(1) rotate(180deg)}}
#intro h1{font-family:Georgia,'Times New Roman',serif;font-size:20px;color:#e2e8f0;text-align:center;line-height:1.2;margin-bottom:2px;text-shadow:0 1px 6px rgba(0,0,0,.3)}
#intro h1 span{display:block;font-size:26px;font-weight:900;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#intro .brand{font-size:10px;color:#94a3b8;letter-spacing:.8px;margin-bottom:14px}
.play-btn{background:linear-gradient(90deg,#1a6fd4,#7c3aed);color:#fff;border:none;padding:10px 28px;border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;animation:btnPulse 2s ease-in-out infinite;box-shadow:0 2px 16px rgba(26,111,212,.5);letter-spacing:.3px}
@keyframes btnPulse{0%,100%{transform:scale(1);box-shadow:0 2px 16px rgba(26,111,212,.5)}50%{transform:scale(1.05);box-shadow:0 4px 24px rgba(26,111,212,.7)}}

/* ── MAP ── */
#map{position:absolute;top:0;left:0;width:300px;height:250px;z-index:500}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}
.map-header{position:absolute;top:0;left:0;right:0;height:34px;background:linear-gradient(135deg,#0038b8 0%,#1a6fd4 40%,#7c3aed 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;letter-spacing:.5px;z-index:1002;box-shadow:0 2px 12px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .3s;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.map-header.visible{opacity:1;pointer-events:auto}
.map-header .pin{margin-right:5px;font-size:16px;display:inline-block;animation:pinBounce 1.5s ease-in-out infinite}
@keyframes pinBounce{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-5px) scale(1.15)}50%{transform:translateY(0) scale(1)}70%{transform:translateY(-2px) scale(1.05)}}
.crosshair-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:1002;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:4px 12px;border-radius:12px;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.crosshair-hint.visible{opacity:1}

/* ── MID-GAME POPUP (like the real game) ── */
/* Mid-game popup — matches full game pts-popup */
#mid-popup{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);z-index:1003;pointer-events:none;text-align:center;opacity:0;white-space:nowrap;max-width:90%}
.pts-number{font-family:Georgia,'Times New Roman',serif;font-weight:900;line-height:1;display:block;filter:drop-shadow(0 2px 12px rgba(0,0,0,.35));text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,-3px 0 0 #fff,3px 0 0 #fff,0 -3px 0 #fff,0 3px 0 #fff}
.pts-label{font-family:Georgia,'Times New Roman',serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;display:block;margin-top:4px;opacity:.95;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff,-2px 0 0 #fff,2px 0 0 #fff,0 -2px 0 #fff,0 2px 0 #fff}
@keyframes ptsMiss{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}75%{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0)}100%{opacity:0;transform:translate(-50%,calc(-50% - 30px)) scale(.9)}}
@keyframes ptsGood{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}25%{opacity:1;transform:translate(-50%,-50%) scale(1.12)}55%{opacity:1;transform:translate(-50%,-50%) scale(1)}85%{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0)}100%{opacity:0;transform:translate(-50%,calc(-50% - 50px)) scale(.95)}}
@keyframes ptsPerfect{0%{opacity:0;transform:translate(-50%,-50%) scale(.2) rotate(-8deg)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.35) rotate(3deg)}30%{opacity:1;transform:translate(-50%,-50%) scale(.95) rotate(-1deg)}45%{opacity:1;transform:translate(-50%,-50%) scale(1.08) rotate(1deg)}60%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}85%{opacity:1;transform:translate(-50%,calc(-50% - 20px)) scale(1)}100%{opacity:0;transform:translate(-50%,calc(-50% - 80px)) scale(1.1)}}
@keyframes ptsPulseGlow{0%,100%{text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,-3px 0 0 #fff,3px 0 0 #fff,0 -3px 0 #fff,0 3px 0 #fff,0 0 20px currentColor,0 0 40px currentColor}50%{text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,-3px 0 0 #fff,3px 0 0 #fff,0 -3px 0 #fff,0 3px 0 #fff,0 0 40px currentColor,0 0 80px currentColor,0 0 120px currentColor}}
#mid-popup.show-miss{animation:ptsMiss 1.8s cubic-bezier(.4,0,.6,1) forwards}
#mid-popup.show-good{animation:ptsGood 2.2s cubic-bezier(.34,1.2,.64,1) forwards}
#mid-popup.show-perfect{animation:ptsPerfect 2.6s cubic-bezier(.34,1.56,.64,1) forwards}
#mid-popup.show-perfect .pts-number{animation:ptsPulseGlow .7s ease-in-out .3s 3}

/* ── RESULT ── */
#result{background:rgba(13,31,56,.95);z-index:1003;padding:10px 16px;gap:0}
#result .result-card{background:rgba(255,255,255,.07);border-radius:16px;padding:14px 16px 12px;width:100%;display:flex;flex-direction:column;align-items:center;border:1px solid rgba(255,255,255,.1)}
#result .r-emoji{font-size:34px;line-height:1;display:inline-block;opacity:0;transform:scale(0)}
#result.active .r-emoji{opacity:1;transform:scale(1);transition:opacity .3s ease-out .1s,transform .3s ease-out .1s;animation:emojFloat 2s ease-in-out .5s infinite}
@keyframes emojFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#result .r-grade{font-family:Georgia,serif;font-size:16px;font-weight:900;line-height:1.1;margin:2px 0}
#result .r-dist{font-family:Georgia,serif;font-size:24px;font-weight:900;line-height:1;margin:2px 0}
#result .r-label{font-size:10px;color:#94a3b8;font-weight:600;margin-bottom:6px}
/* Accuracy bar */
.bar-wrap{width:100%;height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;margin-bottom:8px}
.bar-fill{height:100%;border-radius:99px;width:0%;transition:width 1s cubic-bezier(.34,1.2,.64,1)}
/* City label tooltip (same as full game) */
.city-label{background:rgba(255,255,255,.75)!important;border:none!important;border-radius:10px!important;padding:0!important;box-shadow:0 3px 14px rgba(0,0,0,.18)!important;white-space:nowrap!important;overflow:hidden!important}
.city-label::before{display:none!important}
.tooltip-inner{display:flex;align-items:center;gap:8px;padding:5px 10px}
.tooltip-name{font-family:Georgia,'Times New Roman',serif;font-size:13px;font-weight:700;color:#1a1e27;letter-spacing:.01em}
/* CTA */
.cta-btn{background:linear-gradient(90deg,#1a6fd4,#7c3aed);color:#fff;border:none;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 16px rgba(26,111,212,.5);transition:transform .15s,box-shadow .15s;display:inline-block;text-decoration:none;text-align:center;letter-spacing:.3px;width:100%}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(26,111,212,.6)}
.cta-sub{font-size:9px;color:#f1f5f9;margin-top:5px;letter-spacing:.3px}

/* ── AD BORDER (Google requirement) ── */
body::after{content:'';position:absolute;inset:0;border:1px solid rgba(255,255,255,.12);pointer-events:none;border-radius:2px;z-index:9999}
</style>

function distKm(a, b) {
  var R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
  var x=dLng*Math.cos((a.lat+b.lat)/2*Math.PI/180);
  return R*Math.sqrt(dLat*dLat+x*x);
}

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  if(id) document.getElementById(id).classList.add('active');
}

var gameStarted = false;
function startGame() {
  if (gameStarted) return;
  gameStarted = true;
  show(null);
  document.getElementById('map-header').classList.add('visible');
  document.getElementById('tap-hint').classList.add('visible');

  map.getContainer().style.cursor = 'crosshair';

  map.on('click', function(e) {
    if(hasGuessed) return;
    hasGuessed = true;
    document.getElementById('tap-hint').classList.remove('visible');
    handleGuess(e.latlng);
  });
}
setTimeout(startGame, 4000);

function handleGuess(guess) {
  var d = distKm(guess, JER);
  var km = Math.round(d);

  // Grade
  var emoji, grade, color;
  if(km < 5)       {emoji='🎯'; grade='Nailed it!';      color='#22c55e';}
  else if(km < 15) {emoji='🌟'; grade='Almost perfect!';  color='#4ade80';}
  else if(km < 40) {emoji='👏'; grade='Nice one!';         color='#60a5fa';}
  else if(km < 100){emoji='🗺️'; grade='Not bad!';         color='#fbbf24';}
  else if(km < 150){emoji='😅'; grade='Off the mark...';  color='#f97316';}
  else             {emoji='💀'; grade='Way off!';          color='#ef4444';}

  // Distance display
  var distDisplay, distLabel;
  if(km === 0) {distDisplay='0'; distLabel='km from target';}
  else if(d < 1) {distDisplay=Math.round(d*1000); distLabel='meters away';}
  else {distDisplay=d < 10 ? d.toFixed(1) : km; distLabel='km away';}

  // Guess marker
  L.circleMarker([guess.lat, guess.lng], {
    radius:6, color:'#fff', weight:2.5, fillColor:'#ef4444', fillOpacity:1
  }).addTo(map);

  // Target marker + label (same style as full game)
  var targetMarker = L.circleMarker([JER.lat, JER.lng], {
    radius:9, color:color, weight:2, fillColor:color, fillOpacity:.9
  }).addTo(map);
  targetMarker.bindTooltip(
    '<div class="tooltip-inner"><span class="tooltip-name">Jerusalem</span></div>',
    {permanent:true, direction:'top', offset:[0,-10], className:'city-label'}
  ).openTooltip();

  // Dashed line
  L.polyline([[guess.lat,guess.lng],[JER.lat,JER.lng]], {
    color:'#f87171', weight:2, dashArray:'6,4', opacity:.7
  }).addTo(map);

  // Mid-game popup (same as full game's showPtsPopup)
  var el = document.getElementById('mid-popup');
  el.className = '';
  void el.offsetWidth; // force reflow

  var label = emoji + ' ' + grade;
  var perfect = km < 5;
  var fontSize = perfect ? '3.5rem' : km <= 15 ? '2.8rem' : km <= 40 ? '2.2rem' : '1.8rem';
  var labelSize = perfect ? '2rem' : km <= 15 ? '1.5rem' : km <= 40 ? '1.2rem' : '1rem';
  var cls = perfect ? 'show-perfect' : km <= 40 ? 'show-good' : 'show-miss';

  el.innerHTML = '<span class="pts-label" style="color:'+color+';font-size:'+labelSize+'">'+label+'</span>';
  el.classList.add(cls);
  el.addEventListener('animationend', function(){ el.className = ''; }, {once:true});

  // Accuracy for bar (100% = 0km, 0% = 200km+)
  var accuracy = Math.max(2, Math.round(100 * (1 - Math.min(d, 200) / 200)));

  // Show result card after popup animation
  setTimeout(function() {
    document.getElementById('map-header').classList.remove('visible');
    document.getElementById('r-emoji').textContent = emoji;
    document.getElementById('r-grade').textContent = grade;
    document.getElementById('r-grade').style.color = color;
    document.getElementById('r-dist').textContent = distDisplay;
    document.getElementById('r-dist').style.color = color;
    document.getElementById('r-label').textContent = distLabel;
    document.getElementById('cta-btn').href = clickTag;

    show('result');

    // Animate bar
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        var bar = document.getElementById('bar-fill');
        bar.style.background = color;
        bar.style.width = accuracy + '%';
      });
    });
  }, 2200);
}

// Google Ads: stop animations after 30s
setTimeout(function(){
  var s=document.createElement('style');
  s.textContent='*{animation:none!important;transition:none!important}';
  document.head.appendChild(s);
},30000);
</script>
