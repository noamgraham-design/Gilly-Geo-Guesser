<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="ad.size" content="width=300,height=250">
<title>Find Jerusalem - Gilly's Israel Quiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:300px;height:250px;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#0b1a2e;position:relative}

/* Screens */
.screen{position:absolute;top:0;left:0;width:300px;height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease;z-index:1000}
.screen.active{opacity:1;pointer-events:auto}

/* Intro */
#intro{background:linear-gradient(160deg,#0b1a2e 0%,#132e4a 60%,#1a3f5c 100%);z-index:1001}
#intro h1{font-family:Georgia,'Times New Roman',serif;font-size:21px;color:#e2e8f0;text-align:center;line-height:1.25;margin-bottom:4px;text-shadow:0 1px 8px rgba(0,0,0,.4)}
#intro h1 span{color:#60a5fa;display:block;font-size:27px;margin-top:2px}
#intro .brand{font-size:11px;color:#a78bfa;font-weight:600;letter-spacing:.8px;margin-bottom:18px;text-transform:uppercase}
#intro .tagline{font-size:11px;color:#94a3b8;margin-bottom:14px}
.play-btn{background:linear-gradient(90deg,#1a6fd4,#7c3aed);color:#fff;border:none;padding:11px 30px;border-radius:22px;font-size:14px;font-weight:700;cursor:pointer;animation:pulse 2s ease-in-out infinite;box-shadow:0 2px 16px rgba(26,111,212,.45);letter-spacing:.3px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

/* Map */
#map{position:absolute;top:0;left:0;width:300px;height:250px;z-index:500}
#map .leaflet-container{cursor:crosshair!important}
.map-header{position:absolute;top:0;left:0;right:0;height:30px;background:linear-gradient(90deg,rgba(26,111,212,.92),rgba(45,90,160,.92));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;letter-spacing:.3px;z-index:1002;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
.map-header.visible{opacity:1;pointer-events:auto}
.map-header .pin{margin-right:5px;font-size:14px}

/* Result overlay */
#result{background:rgba(11,26,46,.88);backdrop-filter:blur(6px);z-index:1003;padding:14px}
#result .grade{font-size:32px;margin-bottom:2px}
#result .dist-text{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:2px}
#result .msg{font-size:12px;color:#94a3b8;margin-bottom:14px}
.cta-btn{background:linear-gradient(90deg,#1a6fd4,#7c3aed);color:#fff;border:none;padding:11px 26px;border-radius:22px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 16px rgba(26,111,212,.45);transition:transform .15s;display:inline-block;text-decoration:none;text-align:center;letter-spacing:.3px}
.cta-btn:hover{transform:scale(1.04)}
.cta-sub{font-size:9px;color:#64748b;margin-top:6px}

/* Arrow animation for result */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#result.active{animation:fadeIn .4s ease}

/* Ad border (Google requirement) */
body::after{content:'';position:absolute;inset:0;border:1px solid rgba(255,255,255,.15);pointer-events:none;border-radius:2px;z-index:9999}

/* Hide Leaflet controls for clean ad look */
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}
</style>
<script>
var clickTag = "https://noamgraham-design.github.io/gilly-geo-guesser/?utm_source=google_ads&utm_medium=display&utm_campaign=find_jerusalem";
</script>
</head>
<body>

<!-- Leaflet map (always present behind overlays) -->
<div id="map"></div>

<!-- Header bar (shown during game) -->
<div id="map-header" class="map-header">
  <span class="pin">📍</span> Find Jerusalem!
</div>

<!-- State 1: Intro -->
<div id="intro" class="screen active">
  <h1>Can You Find<span>Jerusalem?</span></h1>
  <div class="brand">Gilly's Israel Quiz</div>
  <div class="tagline">Tap the map to guess its location</div>
  <button class="play-btn" onclick="startGame()">Play Now</button>
</div>

<!-- State 3: Result -->
<div id="result" class="screen">
  <div class="grade" id="grade-emoji"></div>
  <div class="dist-text" id="dist-text"></div>
  <div class="msg" id="grade-msg"></div>
  <a id="cta-btn" class="cta-btn" href="#" target="_blank">Play the Full Game!</a>
  <div class="cta-sub">130+ cities & towns to discover</div>
</div>

<script>
var JER_LAT = 31.7788, JER_LNG = 35.2258;
var map, guessMarker, targetMarker, resultLine, hasGuessed = false;

// Initialize Leaflet map (hidden behind intro)
map = L.map('map', {
  center: [31.5, 34.9],
  zoom: 7,
  minZoom: 7,
  maxZoom: 7,
  zoomControl: false,
  dragging: false,
  scrollWheelZoom: false,
  doubleClickZoom: false,
  touchZoom: false,
  boxZoom: false,
  keyboard: false,
  attributionControl: false,
  maxBounds: L.latLngBounds(L.latLng(29.0, 33.5), L.latLng(33.8, 36.3)),
  maxBoundsViscosity: 1.0
});

// Satellite tiles — same as the real game
L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 18 }
).addTo(map);

function distKm(lat1, lng1, lat2, lng2) {
  var R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  var x = dLng * Math.cos((lat1+lat2)/2*Math.PI/180);
  return R * Math.sqrt(dLat*dLat + x*x);
}

function show(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
  if (id) document.getElementById(id).classList.add('active');
}

function startGame() {
  show(null); // hide all overlays — reveal the map
  document.getElementById('map-header').classList.add('visible');

  map.on('click', function(e) {
    if (hasGuessed) return;
    hasGuessed = true;
    handleGuess(e.latlng.lat, e.latlng.lng);
  });
}

function handleGuess(lat, lng) {
  var d = distKm(lat, lng, JER_LAT, JER_LNG);
  var km = Math.round(d);

  // Show guess marker (red)
  guessMarker = L.circleMarker([lat, lng], {
    radius: 7, color: '#fff', weight: 2, fillColor: '#ef4444', fillOpacity: 1
  }).addTo(map);

  // Show target marker (green) for Jerusalem
  targetMarker = L.circleMarker([JER_LAT, JER_LNG], {
    radius: 7, color: '#fff', weight: 2, fillColor: '#22c55e', fillOpacity: 1
  }).addTo(map);

  // Label for Jerusalem
  L.marker([JER_LAT, JER_LNG], {
    icon: L.divIcon({
      className: '',
      html: '<div style="color:#22c55e;font-size:10px;font-weight:700;font-family:system-ui,sans-serif;text-shadow:0 0 4px rgba(0,0,0,.8);white-space:nowrap;margin-left:10px;margin-top:-6px">Jerusalem</div>',
      iconSize: [0, 0]
    })
  }).addTo(map);

  // Draw line between guess and target
  resultLine = L.polyline([[lat, lng], [JER_LAT, JER_LNG]], {
    color: '#f87171', weight: 2, dashArray: '6,4', opacity: 0.8
  }).addTo(map);

  // Determine grade
  var emoji, msg;
  if (km < 20) { emoji = '🎯'; msg = 'Amazing! You nailed it!'; }
  else if (km < 50) { emoji = '🌟'; msg = 'So close! Great job!'; }
  else if (km < 100) { emoji = '👏'; msg = 'Not bad at all!'; }
  else { emoji = '🗺️'; msg = 'Keep practicing!'; }

  // Show result after a short delay to let user see the markers
  setTimeout(function() {
    document.getElementById('grade-emoji').textContent = emoji;
    document.getElementById('dist-text').textContent = 'You were ' + km + ' km away!';
    document.getElementById('grade-msg').textContent = msg;
    document.getElementById('cta-btn').href = clickTag;
    document.getElementById('map-header').classList.remove('visible');
    show('result');
  }, 1200);
}

// Google Ads: stop all animations after 30s
setTimeout(function() {
  var s = document.createElement('style');
  s.textContent = '*{animation:none!important;transition:none!important}';
  document.head.appendChild(s);
}, 30000);
</script>
</body>
</html>
