<html lang="en">
<head>
<meta charset="utf-8">
<meta name="ad.size" content="width=300,height=250">
<title>Find Jerusalem - Gilly's Israel Quiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:300px;height:250px;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#0b1a2e;position:relative}

/* ── SCREENS ── */
.screen{position:absolute;top:0;left:0;width:300px;height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .45s ease;z-index:1000}
.screen.active{opacity:1;pointer-events:auto}

/* ── INTRO ── */
#intro{background:linear-gradient(160deg,#0d1f38 0%,#132e4a 50%,#1a3f5c 100%);z-index:1001}
.logo-wrap{position:relative;width:72px;height:72px;margin-bottom:8px}
.logo-wrap img{width:72px;height:72px;object-fit:contain;animation:logoFloat 2.6s ease-in-out infinite}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.spark{position:absolute;line-height:1;pointer-events:none;user-select:none;animation:sparkle 2.6s ease-in-out infinite}
.spark-1{top:-4px;right:-2px;color:#7c3aed;font-size:13px;animation-delay:0s}
.spark-2{bottom:4px;left:-6px;color:#60a5fa;font-size:9px;animation-delay:.9s}
.spark-3{top:50%;right:-10px;color:#f59e0b;font-size:10px;animation-delay:1.7s}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0)}40%,60%{opacity:1;transform:scale(1) rotate(180deg)}}
#intro h1{font-family:Georgia,'Times New Roman',serif;font-size:20px;color:#e2e8f0;text-align:center;line-height:1.2;margin-bottom:2px;text-shadow:0 1px 6px rgba(0,0,0,.3)}
#intro h1 span{display:block;font-size:26px;font-weight:900;background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#intro .brand{font-size:10px;color:#94a3b8;letter-spacing:.8px;margin-bottom:14px}
.play-btn{background:linear-gradient(90deg,#1a6fd4,#7c3aed);color:#fff;border:none;padding:10px 28px;border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;animation:btnPulse 2s ease-in-out infinite;box-shadow:0 2px 16px rgba(26,111,212,.5);letter-spacing:.3px}
@keyframes btnPulse{0%,100%{transform:scale(1);box-shadow:0 2px 16px rgba(26,111,212,.5)}50%{transform:scale(1.05);box-shadow:0 4px 24px rgba(26,111,212,.7)}}

/* ── MAP ── */
#map{position:absolute;top:0;left:0;width:300px;height:250px;z-index:500}
.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}
.map-header{position:absolute;top:0;left:0;right:0;height:28px;background:linear-gradient(90deg,rgba(26,111,212,.93),rgba(45,90,160,.93));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;letter-spacing:.3px;z-index:1002;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
.map-header.visible{opacity:1;pointer-events:auto}
.map-header .pin{margin-right:4px;font-size:13px}
.crosshair-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:1002;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:4px 12px;border-radius:12px;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px)}
.crosshair-hint.visible{opacity:1}
/* Layer toggle */
.layer-btn{position:absolute;top:32px;right:6px;z-index:1002;width:28px;height:28px;border-radius:6px;border:none;background:rgba(255,255,255,.9);box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer;font-size:14px;line-height:28px;padding:0;opacity:0;pointer-events:none;transition:opacity .3s}
.layer-btn.visible{opacity:1;pointer-events:auto}
.layer-btn:hover{background:#fff}

/* ── MID-GAME POPUP (like the real game) ── */
#mid-popup{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);z-index:1003;pointer-events:none;text-align:center;opacity:0;white-space:nowrap}
#mid-popup .mid-emoji{font-size:38px;line-height:1;display:block;filter:drop-shadow(0 2px 10px rgba(0,0,0,.4))}
#mid-popup .mid-text{font-family:Georgia,serif;font-weight:900;font-size:18px;line-height:1.1;display:block;margin-top:4px;text-shadow:-2px -2px 0 #fff,2px -2px 0 #fff,-2px 2px 0 #fff,2px 2px 0 #fff,-3px 0 0 #fff,3px 0 0 #fff,0 -3px 0 #fff,0 3px 0 #fff}
#mid-popup .mid-dist{font-size:11px;font-weight:700;display:block;margin-top:2px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6)}
@keyframes midPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(-5deg)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(2deg)}40%{transform:translate(-50%,-50%) scale(.95) rotate(0)}60%{transform:translate(-50%,-50%) scale(1.05)}80%{opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0)}100%{opacity:0;transform:translate(-50%,calc(-50% - 40px)) scale(1.05)}}
#mid-popup.show{animation:midPop 2.4s cubic-bezier(.34,1.4,.64,1) forwards}

/* ── RESULT ── */
#result{background:rgba(13,31,56,.92);backdrop-filter:blur(8px);z-index:1003;padding:10px 16px;gap:0}
#result .result-card{background:rgba(255,255,255,.07);border-radius:16px;padding:14px 16px 12px;width:100%;display:flex;flex-direction:column;align-items:center;border:1px solid rgba(255,255,255,.1)}
#result .r-emoji{font-size:34px;line-height:1}
@keyframes emojiEntrance{0%{transform:scale(0) rotate(-15deg);opacity:0}40%{transform:scale(1.4) rotate(8deg);opacity:1}60%{transform:scale(.85) rotate(-3deg)}80%{transform:scale(1.1) rotate(1deg)}100%{transform:scale(1) rotate(0)}}
@keyframes emojiBounce{0%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-6px) scale(1.08)}60%{transform:translateY(2px) scale(.97)}}
#result.active .r-emoji{animation:emojiEntrance .6s cubic-bezier(.34,1.56,.64,1) .1s both,emojiBounce 2s ease-in-out 1s infinite}
#result .r-grade{font-family:Georgia,serif;font-size:16px;font-weight:900;line-height:1.1;margin:2px 0}
#result .r-dist{font-family:Georgia,serif;font-size:24px;font-weight:900;line-height:1;margin:2px 0}
#result .r-label{font-size:10px;color:#94a3b8;font-weight:600;margin-bottom:6px}
/* Accuracy bar */
.bar-wrap{width:100%;height:6px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;margin-bottom:8px}
.bar-fill{height:100%;border-radius:99px;width:0%;transition:width 1s cubic-bezier(.34,1.2,.64,1)}
/* CTA */
.cta-btn{background:linear-gradient(90deg,#1a6fd4,#7c3aed);color:#fff;border:none;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 3px 16px rgba(26,111,212,.5);transition:transform .15s,box-shadow .15s;display:inline-block;text-decoration:none;text-align:center;letter-spacing:.3px;width:100%}
.cta-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(26,111,212,.6)}
.cta-sub{font-size:8px;color:#64748b;margin-top:4px}

/* ── AD BORDER (Google requirement) ── */
body::after{content:'';position:absolute;inset:0;border:1px solid rgba(255,255,255,.12);pointer-events:none;border-radius:2px;z-index:9999}
</style>

  <h1>Can You Find<span>Jerusalem?</span></h1>
  <div class="brand">GILLY'S ISRAEL QUIZ</div>
  <button class="play-btn" onclick="startGame()">Play Now</button>
</div>

<!-- State 3: Result -->
<div id="result" class="screen">
  <div class="result-card">
    <div class="r-emoji" id="r-emoji"></div>
    <div class="r-grade" id="r-grade"></div>
    <div class="r-dist" id="r-dist"></div>
    <div class="r-label" id="r-label"></div>
    <div class="bar-wrap"><div class="bar-fill" id="bar-fill"></div></div>
    <a id="cta-btn" class="cta-btn" href="#" target="_blank">Play the Full Game →</a>
    <div class="cta-sub">Many more cities & towns to discover!</div>
  </div>
</div>

<script>
var JER = {lat:31.7788, lng:35.2258};
var map, hasGuessed = false;

map = L.map('map', {
  center: [31.4, 35.0],
  zoom: 8,
  minZoom: 7,
  maxZoom: 9,
  zoomControl: false,
  dragging: false,
  scrollWheelZoom: false,
  doubleClickZoom: false,
  touchZoom: false,
  boxZoom: false,
  keyboard: false,
  attributionControl: false,
  maxBounds: L.latLngBounds(L.latLng(29.0, 33.5), L.latLng(33.8, 36.3)),
  maxBoundsViscosity: 1.0
});

var satelliteLayer = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom: 18}
);
var streetLayer = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {maxZoom: 19}
);
var currentLayer = 'satellite';
satelliteLayer.addTo(map);

function toggleLayer() {
  if (currentLayer === 'satellite') {
    map.removeLayer(satelliteLayer);
    streetLayer.addTo(map);
    currentLayer = 'street';
    document.getElementById('layer-btn').textContent = '🛰️';
  } else {
    map.removeLayer(streetLayer);
    satelliteLayer.addTo(map);
    currentLayer = 'satellite';
    document.getElementById('layer-btn').textContent = '🗺️';
  }
}

function distKm(a, b) {
  var R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
  var x=dLng*Math.cos((a.lat+b.lat)/2*Math.PI/180);
  return R*Math.sqrt(dLat*dLat+x*x);
}

function show(id) {
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});
  if(id) document.getElementById(id).classList.add('active');
}

function startGame() {
  show(null);
  document.getElementById('map-header').classList.add('visible');
  document.getElementById('tap-hint').classList.add('visible');
  document.getElementById('layer-btn').classList.add('visible');

  map.getContainer().style.cursor = 'crosshair';

  map.on('click', function(e) {
    if(hasGuessed) return;
    hasGuessed = true;
    document.getElementById('tap-hint').classList.remove('visible');
    handleGuess(e.latlng);
  });
}

function handleGuess(guess) {
  var d = distKm(guess, JER);
  var km = Math.round(d);

  // Grade
  var emoji, grade, color;
  if(km < 5)       {emoji='🎯'; grade='Nailed it!';      color='#22c55e';}
  else if(km < 15) {emoji='🌟'; grade='Almost perfect!';  color='#4ade80';}
  else if(km < 40) {emoji='👏'; grade='Nice one!';         color='#60a5fa';}
  else if(km < 100){emoji='🗺️'; grade='Not bad!';         color='#fbbf24';}
  else if(km < 150){emoji='😅'; grade='Off the mark...';  color='#f97316';}
  else             {emoji='💀'; grade='Way off!';          color='#ef4444';}

  // Distance display
  var distDisplay, distLabel;
  if(km === 0) {distDisplay='0'; distLabel='km from target';}
  else if(d < 1) {distDisplay=Math.round(d*1000); distLabel='meters away';}
  else {distDisplay=d < 10 ? d.toFixed(1) : km; distLabel='km away';}

  // Guess marker
  L.circleMarker([guess.lat, guess.lng], {
    radius:6, color:'#fff', weight:2.5, fillColor:'#ef4444', fillOpacity:1
  }).addTo(map);

  // Target marker
  L.circleMarker([JER.lat, JER.lng], {
    radius:6, color:'#fff', weight:2.5, fillColor:'#22c55e', fillOpacity:1
  }).addTo(map);

  // Jerusalem label
  L.marker([JER.lat, JER.lng], {
    icon: L.divIcon({
      className:'',
      html:'<div style="color:#22c55e;font-size:10px;font-weight:800;font-family:system-ui;text-shadow:0 0 6px rgba(0,0,0,.9),0 0 2px rgba(0,0,0,.9);white-space:nowrap;margin-left:10px;margin-top:-7px">Jerusalem ✡</div>',
      iconSize:[0,0]
    })
  }).addTo(map);

  // Dashed line
  L.polyline([[guess.lat,guess.lng],[JER.lat,JER.lng]], {
    color:'#f87171', weight:2, dashArray:'6,4', opacity:.7
  }).addTo(map);

  // Mid-game popup (game-style animated feedback over map)
  var mp = document.getElementById('mid-popup');
  document.getElementById('mid-emoji').textContent = emoji;
  document.getElementById('mid-text').textContent = grade;
  document.getElementById('mid-text').style.color = color;
  document.getElementById('mid-dist').textContent = distDisplay + ' ' + distLabel;
  mp.className = 'show';

  // Accuracy for bar (100% = 0km, 0% = 200km+)
  var accuracy = Math.max(2, Math.round(100 * (1 - Math.min(d, 200) / 200)));

  // Show result card after popup animation
  setTimeout(function() {
    document.getElementById('map-header').classList.remove('visible');
    document.getElementById('layer-btn').classList.remove('visible');
    document.getElementById('r-emoji').textContent = emoji;
    document.getElementById('r-grade').textContent = grade;
    document.getElementById('r-grade').style.color = color;
    document.getElementById('r-dist').textContent = distDisplay;
    document.getElementById('r-dist').style.color = color;
    document.getElementById('r-label').textContent = distLabel;
    document.getElementById('cta-btn').href = clickTag;

    show('result');

    // Animate bar
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        var bar = document.getElementById('bar-fill');
        bar.style.background = color;
        bar.style.width = accuracy + '%';
      });
    });
  }, 2200);
}

// Google Ads: stop animations after 30s
setTimeout(function(){
  var s=document.createElement('style');
  s.textContent='*{animation:none!important;transition:none!important}';
  document.head.appendChild(s);
},30000);
</script>
</body>
</html>
