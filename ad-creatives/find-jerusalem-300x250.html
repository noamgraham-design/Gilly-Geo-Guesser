<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:300px;height:250px;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#f0f4ff;position:relative}
.screen{position:absolute;top:0;left:0;width:300px;height:250px;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s ease}

/* State 1: Intro */

#intro .silhouette{width:60px;height:160px;position:absolute;right:30px;top:45px;opacity:.08}

#intro .brand{font-size:12px;color:#7c3aed;font-weight:600;letter-spacing:.5px;margin-bottom:16px}
.play-btn{background:linear-gradient(90deg,#1a6fd4,#7c3aed);color:#fff;border:none;padding:10px 28px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;animation:pulse 2s ease-in-out infinite;box-shadow:0 2px 12px rgba(26,111,212,.35)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

/* State 2: Map */
#game{background:#f0f4ff}
#game .header{width:100%;height:32px;background:linear-gradient(90deg,#1a6fd4,#2d5aa0);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;letter-spacing:.3px;flex-shrink:0}
#game .header .pin{margin-right:5px}
#game .map-area{flex:1;width:100%;position:relative;cursor:crosshair;display:flex;align-items:center;justify-content:center}
#game svg{height:195px}
.land{fill:#dbeafe;stroke:#1a6fd4;stroke-width:1.5;stroke-linejoin:round;cursor:crosshair;transition:fill .15s}
.land:hover{fill:#bfdbfe}
.city-dot{fill:#94a3b8;stroke:#fff;stroke-width:1}
.city-label{font-size:7px;fill:#64748b;font-family:system-ui,sans-serif}
.guess-marker{display:none}

/* State 3: Result */
#result{background:linear-gradient(160deg,#f0f4ff 0%,#dbeafe 100%);padding:12px}
#result .grade{font-size:28px;margin-bottom:2px}
#result .dist-text{font-size:15px;font-weight:700;color:#1a3a5c;margin-bottom:2px}
#result .msg{font-size:12px;color:#64748b;margin-bottom:10px}
#result .mini-map{height:100px;margin-bottom:10px}
.result-line{stroke:#ef4444;stroke-width:1;stroke-dasharray:3,2;opacity:.6}
.marker-guess{fill:#ef4444;stroke:#fff;stroke-width:1.2}
.marker-target{fill:#22c55e;stroke:#fff;stroke-width:1.2}
.target-label{font-size:6.5px;fill:#15803d;font-weight:700;font-family:system-ui,sans-serif}
.cta-btn{background:linear-gradient(90deg,#1a6fd4,#7c3aed);color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 12px rgba(26,111,212,.35);transition:transform .15s;display:block;text-decoration:none;text-align:center}
.cta-btn:hover{transform:scale(1.04)}
.cta-sub{font-size:9px;color:#94a3b8;margin-top:4px}

/* Border */
body::after{content:'';position:absolute;inset:0;border:1px solid #cbd5e1;pointer-events:none;border-radius:2px}
</style>
<script>
var clickTag = "https://noamgraham-design.github.io/gilly-geo-guesser/?utm_source=google_ads&utm_medium=display&utm_campaign=find_jerusalem";
</script>
</head>
<body>

<div id="game" class="screen">

  <div class="map-area">

  <div class="grade" id="grade-emoji"></div>

    <path class="land" d="M114.6,129.5L126.3,161.2L127.2,168.5L128.9,170.4L128.3,174.6L131.3,176.6L141.1,206.8L142.5,212.4L142.4,217.6L143.6,220.0L145.6,217.3L146.6,217.6L148.9,206.0L151.2,200.5L150.7,197.4L152.5,195.2L151.8,194.3L154.4,188.9L153.7,180.9L155.6,177.8L154.4,173.1L156.1,166.1L159.9,159.6L160.0,157.2L161.7,155.4L161.5,152.2L162.5,149.9L165.1,147.8L166.8,140.5L166.8,137.9L164.4,133.0L167.4,126.3L167.7,116.9L171.2,107.8L169.6,94.1L171.5,85.0L172.0,64.9L173.3,62.6L175.7,62.5L179.6,59.5L183.0,55.2L185.4,49.4L183.7,41.5L182.4,40.5L183.5,38.2L182.1,34.1L180.5,33.0L182.1,30.9L180.5,30.0L177.6,30.3L173.4,34.2L171.5,32.1L168.7,42.0L166.3,42.0L165.7,43.2L163.4,43.7L161.0,41.3L152.0,41.8Z" style="fill:#e2e8f0;stroke:#94a3b8;stroke-width:1"/>

</div>

<script>
// Projection constants
var LAT_MIN=29.4922,LAT_MAX=33.3351,LNG_MIN=34.2188,LNG_MAX=35.8978;
var cosCorr=Math.cos((LAT_MIN+LAT_MAX)/2*Math.PI/180);
var latSpan=LAT_MAX-LAT_MIN;
var MAP_H=190,MAP_W=MAP_H*((LNG_MAX-LNG_MIN)*cosCorr/latSpan);
var OX=(300-MAP_W)/2, OY=30;

// Jerusalem
var JER_LAT=31.7788,JER_LNG=35.2258;
var JER_X=157.1,JER_Y=106.9;

function svgToLatLng(svgX,svgY){
  var lng=(svgX-OX)/(MAP_H*cosCorr/latSpan)+LNG_MIN;
  var lat=LAT_MAX-(svgY-OY)/MAP_H*latSpan;
  return{lat:lat,lng:lng};
}

function distKm(lat1,lng1,lat2,lng2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var x=dLng*Math.cos((lat1+lat2)/2*Math.PI/180);
  return R*Math.sqrt(dLat*dLat+x*x);
}

function show(id){
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++) screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function startGame(){
  show('game');
  var svg=document.getElementById('map-svg');
  var land=svg.querySelector('.land');
  land.addEventListener('click',function(e){
    var pt=svg.createSVGPoint();
    pt.x=e.clientX;pt.y=e.clientY;
    var svgPt=pt.matrixTransform(svg.getScreenCTM().inverse());
    handleGuess(svgPt.x,svgPt.y);
  },{once:true});
}

function handleGuess(sx,sy){
  var guess=svgToLatLng(sx,sy);
  var d=distKm(guess.lat,guess.lng,JER_LAT,JER_LNG);
  var km=Math.round(d);

  // Determine grade
  var emoji,msg;
  if(km<20){emoji='🎯';msg='Amazing! You nailed it!';}
  else if(km<50){emoji='🌟';msg='So close! Great job!';}
  else if(km<100){emoji='👏';msg='Not bad at all!';}
  else{emoji='🗺️';msg='Keep practicing!';}

  // Update result screen
  document.getElementById('grade-emoji').textContent=emoji;
  document.getElementById('dist-text').textContent='You were '+km+' km away!';
  document.getElementById('grade-msg').textContent=msg;

  // Position markers on result map
  document.getElementById('result-guess').setAttribute('cx',sx);
  document.getElementById('result-guess').setAttribute('cy',sy);
  var line=document.getElementById('result-line');
  line.setAttribute('x1',sx);line.setAttribute('y1',sy);
  line.setAttribute('x2',JER_X);line.setAttribute('y2',JER_Y);

  // Set CTA link
  document.getElementById('cta-btn').href=clickTag;

  show('result');
}

// Google Ads: stop all animations after 30s
setTimeout(function(){
  var s=document.createElement('style');
  s.textContent='*{animation:none!important;transition:none!important}';
  document.head.appendChild(s);
},30000);
</script>
